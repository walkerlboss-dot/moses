# ═══════════════════════════════════════════════════════════════════════════
#  Moses v3.0 — GitHub Actions CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════
# Triggers:
#   • Push to main
#   • Pull requests targeting main
#   • Manual dispatch (workflow_dispatch)
#
# Pipeline stages:
#   1. lint   → black, ruff, mypy
#   2. test   → pytest (CPU tests)
#   3. build  → Docker image build
#   4. sim-test → Isaac Lab smoke test (self-hosted GPU runner)
# ═══════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: moses

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  #  Stage 1: Lint
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run black (format check)
        run: black --check --diff src tests

      - name: Run ruff (lint)
        run: ruff check src tests

      - name: Run mypy (type check)
        run: mypy src

  # ─────────────────────────────────────────────────────────────────────────
  #  Stage 2: Test
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (CPU tests only)
        run: |
          pytest tests/ \
            -m "not gpu and not isaac" \
            --cov=src/moses \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  #  Stage 3: Build Docker image
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ─────────────────────────────────────────────────────────────────────────
  #  Stage 4: Isaac Lab Smoke Test (GPU)
  # ─────────────────────────────────────────────────────────────────────────
  sim-test:
    name: Isaac Lab Smoke Test
    runs-on: [self-hosted, gpu]
    needs: build
    # Only run on main branch pushes or when explicitly requested
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify GPU availability
        run: nvidia-smi

      - name: Run Isaac Lab smoke test
        run: |
          docker run --rm --gpus all \
            -v ${{ github.workspace }}/checkpoints:/app/checkpoints \
            -v ${{ github.workspace }}/logs:/app/logs \
            ${{ env.IMAGE_NAME }}:latest \
            python -m pytest tests/smoke/test_isaac_lab.py -v

      - name: Upload simulation logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-logs
          path: logs/
